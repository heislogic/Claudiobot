name: Deploy Automatico Discloud

on:
  push:
    branches:
      - main # Ajuste para 'master' se for o caso

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pegando o codigo do GitHub
        uses: actions/checkout@v4

      - name: Enviando para a Discloud
        # ATUALIZADO: Discloud
        uses: discloudbot/action-deploy@v3
        with:
          token: ${{ secrets.DISCLOUD_TOKEN }}